# ============================================================
#  外部 Nginx 反代配置:vm.byboy.cc → 本机 docker-compose 的 8686
# ============================================================
#  使用方法:
#    1. 把本文件拷到宿主机 nginx 的站点目录,通常是:
#         /etc/nginx/conf.d/vm.byboy.cc.conf
#       或 Ubuntu/Debian:  /etc/nginx/sites-available/vm.byboy.cc
#                          然后 ln -s ... /etc/nginx/sites-enabled/
#    2. 测试配置语法:   sudo nginx -t
#    3. 重载 nginx:      sudo nginx -s reload
#
#  域名解析(必须先做好):
#    把 vm.byboy.cc 的 A 记录指向本服务器公网 IP。
#
#  关于 HTTPS:
#    本配置只走 HTTP(80)。后续要加 HTTPS,推荐用 certbot:
#       sudo certbot --nginx -d vm.byboy.cc
#    certbot 会自动改这个文件,加上 443 listen + 证书路径 + 80 跳转。
#
#  注意:$connection_upgrade map 块必须出现在 http{} 上下文里、且全局
#       只能定义一次。如果其他站点配置已经定义过同名 map,请删掉下面
#       那一段,否则 nginx -t 会报 "duplicate map" 错误。
# ============================================================

# ---- WebSocket 升级映射(全局唯一,如已存在请删除本段) ----
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- upstream ----
upstream docker_vm_backend {
    server 127.0.0.1:8686;
    keepalive 16;
}

# ---- HTTP 站点 ----
server {
    listen 80;
    listen [::]:80;
    server_name vm.byboy.cc;

    # 客户端请求体上限(注册/登录的 JSON 很小,1m 足够)
    client_max_body_size 1m;

    # 反代超时:创建容器首次会 build 镜像,可能要 1-2 分钟,给宽裕点
    proxy_connect_timeout 30s;
    proxy_send_timeout    180s;
    proxy_read_timeout    180s;

    access_log /var/log/nginx/vm.byboy.cc.access.log;
    error_log  /var/log/nginx/vm.byboy.cc.error.log;

    location / {
        proxy_pass http://docker_vm_backend;

        # 透传原始请求信息(后端靠 X-Forwarded-Proto 判断是否 HTTPS)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持(本项目暂时没用,留作未来扩展)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
