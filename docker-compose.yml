services:
  # ---------- 后端:管理 Docker、提供 API ----------
  backend:
    build: ./backend
    image: docker-vm-backend:latest
    container_name: docker-vm-backend
    restart: unless-stopped
    volumes:
      # 控制宿主机 Docker(等同 root,务必只在可信服务器部署)
      - /var/run/docker.sock:/var/run/docker.sock
      # SQLite 数据持久化
      - ./data:/data
      # Alpine SSH 镜像源,启动时自动 build
      - ./image:/app/image:ro
      # 宿主 LXCFS proc 目录(让子容器 /proc 看到的是实际配额)。宿主没装 lxcfs 时此挂载只是空目录,后端会自动降级。
      - /var/lib/lxcfs/proc:/var/lib/lxcfs/proc:ro
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      ASPNETCORE_URLS: http://+:5000
      DB_PATH: /data/docker-vm.db
    networks:
      - docker-vm-net

  # ---------- 前端:Nginx 托管 Vue + 反代 /api ----------
  frontend:
    build: ./frontend
    image: docker-vm-frontend:latest
    container_name: docker-vm-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8686:80"   # 只绑本机,对外由宿主 nginx 反代 vm.byboy.cc
    depends_on:
      - backend
    networks:
      - docker-vm-net

networks:
  docker-vm-net:
    driver: bridge
